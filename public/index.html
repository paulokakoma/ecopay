<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPay - Painel de Testes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        input:focus, select:focus { outline: none; border-color: #10b981; }
        .tab-active { background: #10b981; color: white; }
        .tab-inactive { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen text-white">
    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-emerald-400">EcoPay</h1>
            <p class="text-slate-400">Painel de Testes da API</p>
        </header>

        <div class="flex gap-2 mb-6 flex-wrap">
            <button onclick="showTab('validate')" id="tab-validate" class="tab-btn px-4 py-2 rounded-lg font-semibold tab-active">Validar Carteira</button>
            <button onclick="showTab('withdraw')" id="tab-withdraw" class="tab-btn px-4 py-2 rounded-lg font-semibold tab-inactive">Saque Instantâneo</button>
            <button onclick="showTab('order')" id="tab-order" class="tab-btn px-4 py-2 rounded-lg font-semibold tab-inactive">Criar Ordem</button>
            <button onclick="showTab('transfer')" id="tab-transfer" class="tab-btn px-4 py-2 rounded-lg font-semibold tab-inactive">Transferência</button>
            <button onclick="showTab('history')" id="tab-history" class="tab-btn px-4 py-2 rounded-lg font-semibold tab-inactive">Histórico</button>
        </div>

        <!-- Validar Carteira -->
        <div id="validate-section" class="glass p-6 rounded-xl space-y-4">
            <h2 class="text-xl font-bold mb-4">Validar Endereço de Carteira</h2>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Endereço</label>
                <input type="text" id="val-addr" class="w-full p-3 rounded-lg text-white" placeholder="0x... ou T...">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Moeda</label>
                <select id="val-coin" class="w-full p-3 rounded-lg text-white">
                    <option value="USDT">USDT</option>
                </select>
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Rede</label>
                <select id="val-chain" class="w-full p-3 rounded-lg text-white">
                    <option value="BSC">BSC (BEP20)</option>
                    <option value="TRC20">TRC20 (Tron)</option>
                </select>
            </div>
            <button onclick="testValidate()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-bold">Validar</button>
            <div id="validate-result" class="hidden p-4 rounded-lg text-sm"></div>
        </div>

        <!-- Saque Instantâneo -->
        <div id="withdraw-section" class="hidden glass p-6 rounded-xl space-y-4">
            <div class="bg-yellow-900/30 border border-yellow-600/50 p-3 rounded-lg text-yellow-300 text-sm mb-4">
                ⚠️ Endpoint de teste - Executa saque direto sem verificações
            </div>
            <h2 class="text-xl font-bold mb-4">Saque Instantâneo (Teste)</h2>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Endereço</label>
                <input type="text" id="wd-addr" class="w-full p-3 rounded-lg text-white" placeholder="0x...">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Quantidade (USDT)</label>
                <input type="number" id="wd-amount" class="w-full p-3 rounded-lg text-white" placeholder="10" step="0.01">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Rede</label>
                <select id="wd-chain" class="w-full p-3 rounded-lg text-white">
                    <option value="BSC">BSC (BEP20)</option>
                    <option value="TRC20">TRC20 (Tron)</option>
                </select>
            </div>
            <button onclick="testWithdraw()" class="w-full py-3 bg-red-500 hover:bg-red-600 rounded-lg font-bold">Executar Saque</button>
            <div id="withdraw-result" class="hidden p-4 rounded-lg text-sm"></div>
        </div>

        <!-- Criar Ordem -->
        <div id="order-section" class="hidden glass p-6 rounded-xl space-y-4">
            <h2 class="text-xl font-bold mb-4">Criar Ordem de Compra</h2>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Profile ID</label>
                <input type="text" id="ord-profile" class="w-full p-3 rounded-lg text-white" placeholder="UUID do perfil">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Quantidade USDT</label>
                <input type="number" id="ord-amount" class="w-full p-3 rounded-lg text-white" placeholder="100" step="0.01">
            </div>
            <button onclick="testOrder()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-bold">Criar Ordem</button>
            <div id="order-result" class="hidden p-4 rounded-lg text-sm"></div>
        </div>

        <!-- Transferência Bybit -->
        <div id="transfer-section" class="hidden glass p-6 rounded-xl space-y-4">
            <h2 class="text-xl font-bold mb-4">Transferência Bybit</h2>
            <div class="grid grid-cols-1 gap-3 mb-4">
                <button onclick="showTransferType('account')" id="transfer-type-account" class="px-4 py-2 rounded-lg font-semibold bg-emerald-600 text-white">Entre Contas</button>
                <button onclick="showTransferType('universal')" id="transfer-type-universal" class="px-4 py-2 rounded-lg font-semibold bg-slate-700 text-slate-300">Transferência Universal</button>
            </div>

            <!-- Transferência entre contas Bybit -->
            <div id="transfer-account-form" class="space-y-4">
                <h3 class="text-lg font-semibold text-emerald-400">Transferência Entre Contas Bybit</h3>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Email da Conta Destinatária</label>
                    <input type="email" id="tf-email" class="w-full p-3 rounded-lg text-white" placeholder="destino@example.com">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Quantidade (USDT)</label>
                    <input type="number" id="tf-amount" class="w-full p-3 rounded-lg text-white" placeholder="10" step="0.01">
                </div>
                <button onclick="testTransferAccount()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-bold">Transferir</button>
                <div id="transfer-result" class="hidden p-4 rounded-lg text-sm"></div>
            </div>

            <!-- Transferência Universal -->
            <div id="transfer-universal-form" class="hidden space-y-4">
                <h3 class="text-lg font-semibold text-blue-400">Transferência Universal</h3>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Destinatário (Email/Endereço)</label>
                    <input type="text" id="tu-recipient" class="w-full p-3 rounded-lg text-white" placeholder="destino@example.com ou 0x...">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Quantidade (USDT)</label>
                    <input type="number" id="tu-amount" class="w-full p-3 rounded-lg text-white" placeholder="10" step="0.01">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-2">Tipo</label>
                    <select id="tu-type" class="w-full p-3 rounded-lg text-white">
                        <option value="TRANSFER">Transferência (Sub-account)</option>
                        <option value="WITHDRAW">Saque (Externo)</option>
                    </select>
                </div>
                <button onclick="testUniversalTransfer()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-lg font-bold">Transferir</button>
                <div id="universal-result" class="hidden p-4 rounded-lg text-sm"></div>
            </div>
        </div>

        <!-- Histórico -->
        <div id="history-section" class="hidden glass p-6 rounded-xl space-y-4">
            <h2 class="text-xl font-bold mb-4">Histórico de Transações</h2>
            <div>
                <label class="block text-sm text-slate-400 mb-2">Profile ID</label>
                <input type="text" id="hist-profile" class="w-full p-3 rounded-lg text-white" placeholder="UUID do perfil">
            </div>
            <button onclick="testHistory()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-lg font-bold">Buscar Histórico</button>
            <div id="history-result" class="hidden p-4 rounded-lg text-sm"></div>
        </div>
    </div>

    <script>
        // Detecta automaticamente o ambiente
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:3001' 
            : 'https://ecopay-api.fly.dev';

        function showTab(tab) {
            const sections = ['validate', 'withdraw', 'order', 'transfer', 'history'];
            sections.forEach(s => {
                document.getElementById(`${s}-section`).classList.toggle('hidden', s !== tab);
                document.getElementById(`tab-${s}`).className = `tab-btn px-4 py-2 rounded-lg font-semibold ${s === tab ? 'tab-active' : 'tab-inactive'}`;
            });
        }

        function showTransferType(type) {
            const accountForm = document.getElementById('transfer-account-form');
            const universalForm = document.getElementById('transfer-universal-form');
            const accountBtn = document.getElementById('transfer-type-account');
            const universalBtn = document.getElementById('transfer-type-universal');

            if (type === 'account') {
                accountForm.classList.remove('hidden');
                universalForm.classList.add('hidden');
                accountBtn.className = 'px-4 py-2 rounded-lg font-semibold bg-emerald-600 text-white';
                universalBtn.className = 'px-4 py-2 rounded-lg font-semibold bg-slate-700 text-slate-300';
            } else {
                accountForm.classList.add('hidden');
                universalForm.classList.remove('hidden');
                accountBtn.className = 'px-4 py-2 rounded-lg font-semibold bg-slate-700 text-slate-300';
                universalBtn.className = 'px-4 py-2 rounded-lg font-semibold bg-blue-600 text-white';
            }
        }

        async function testValidate() {
            const addr = document.getElementById('val-addr').value.trim();
            const coin = document.getElementById('val-coin').value;
            const chain = document.getElementById('val-chain').value;
            const result = document.getElementById('validate-result');

            if (!addr) { showResult(result, 'error', 'Informe o endereço'); return; }

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Validando...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/validate-wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: addr, coin, chain })
                });
                const data = await res.json();
                if (data.success && data.valid) {
                    showResult(result, 'success', `Endereço válido para ${chain}`);
                } else {
                    showResult(result, 'error', data.error || 'Endereço inválido');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        async function testWithdraw() {
            const addr = document.getElementById('wd-addr').value.trim();
            const amount = document.getElementById('wd-amount').value;
            const chain = document.getElementById('wd-chain').value;
            const result = document.getElementById('withdraw-result');

            if (!addr || !amount) { showResult(result, 'error', 'Preencha todos os campos'); return; }

            if (!confirm(`Confirma saque de ${amount} USDT para ${addr}?`)) return;

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Processando saque...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/instant-withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: addr, amount, chain })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(result, 'success', `Saque executado! ID: ${JSON.stringify(data.data)}`);
                } else {
                    showResult(result, 'error', data.message || 'Erro no saque');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        async function testOrder() {
            const profileId = document.getElementById('ord-profile').value.trim();
            const amount = document.getElementById('ord-amount').value;
            const result = document.getElementById('order-result');

            if (!profileId || !amount) { showResult(result, 'error', 'Preencha todos os campos'); return; }

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Criando ordem...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/create-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ profileId, amountUsdt: amount })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(result, 'success', `Ordem criada! Ref: ${data.paymentData.reference}`);
                } else {
                    showResult(result, 'error', data.error || 'Erro ao criar ordem');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        async function testHistory() {
            const profileId = document.getElementById('hist-profile').value.trim();
            const result = document.getElementById('history-result');

            if (!profileId) { showResult(result, 'error', 'Informe o Profile ID'); return; }

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Buscando...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/history/${profileId}`);
                const data = await res.json();
                if (data.success) {
                    showResult(result, 'success', `${data.transactions.length} transações encontradas`);
                    console.table(data.transactions);
                } else {
                    showResult(result, 'error', data.error || 'Erro ao buscar histórico');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        async function testTransferAccount() {
            const email = document.getElementById('tf-email').value.trim();
            const amount = document.getElementById('tf-amount').value;
            const result = document.getElementById('transfer-result');

            if (!email || !amount) { showResult(result, 'error', 'Preencha todos os campos'); return; }
            if (!email.includes('@')) { showResult(result, 'error', 'Email inválido'); return; }

            if (!confirm(`Confirma transferência de ${amount} USDT para ${email}?`)) return;

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Processando transferência...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/transfer-bybit-account`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipientEmail: email, amount, coin: 'USDT' })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(result, 'success', `Transferência iniciada! ID: ${JSON.stringify(data.data)}`);
                } else {
                    showResult(result, 'error', data.error || 'Erro na transferência');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        async function testUniversalTransfer() {
            const recipient = document.getElementById('tu-recipient').value.trim();
            const amount = document.getElementById('tu-amount').value;
            const type = document.getElementById('tu-type').value;
            const result = document.getElementById('universal-result');

            if (!recipient || !amount) { showResult(result, 'error', 'Preencha todos os campos'); return; }

            if (!confirm(`Confirma ${type === 'TRANSFER' ? 'transferência' : 'saque'} de ${amount} USDT para ${recipient}?`)) return;

            result.className = 'p-4 rounded-lg text-sm bg-blue-900/30 border border-blue-600/50 text-blue-300';
            result.textContent = 'Processando...';
            result.classList.remove('hidden');

            try {
                const res = await fetch(`${API_URL}/api/payments/universal-transfer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recipient, amount, coin: 'USDT', type })
                });
                const data = await res.json();
                if (data.success) {
                    showResult(result, 'success', `Transferência universal iniciada! ID: ${JSON.stringify(data.data)}`);
                } else {
                    showResult(result, 'error', data.error || 'Erro na transferência');
                }
            } catch (err) {
                showResult(result, 'error', 'Erro de conexão');
            }
        }

        function showResult(el, type, msg) {
            el.className = `p-4 rounded-lg text-sm ${type === 'success' ? 'bg-emerald-900/30 border border-emerald-600/50 text-emerald-300' : 'bg-red-900/30 border border-red-600/50 text-red-300'}`;
            el.textContent = msg;
            el.classList.remove('hidden');
        }
    </script>
</body>
</html>
